name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm'
    
    - name: Clean install
      run: |
        rm -rf node_modules package-lock.json
        npm install
    
    - name: Run linter
      run: npm run lint || true 
    
    - name: Run tests
      run: npm test