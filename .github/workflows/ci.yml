name: CI Debug

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'
    
    - name: Debug - показать структуру
      run: |
        echo "=== Текущая директория ==="
        pwd
        echo "=== Файлы в корне ==="
        ls -la
        echo "=== Содержимое package.json ==="
        cat package.json
    
    - name: Шаг 1 - npm ci
      run: npm ci
      continue-on-error: true
      
    - name: Шаг 2 - Проверка после установки
      run: |
        echo "=== node_modules после npm ci ==="
        ls -la node_modules || echo "node_modules не создана"
      
    - name: Шаг 3 - npm run lint
      run: npm run lint
      continue-on-error: true
      
    - name: Шаг 4 - npm test
      run: npm test
      continue-on-error: true
      
    - name: Шаг 5 - npm run build
      run: npm run build
      continue-on-error: true
      
    - name: Итоговый статус
      run: echo "Все шаги выполнены. Проверьте логи выше."